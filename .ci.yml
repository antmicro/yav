image: debian:bookworm
stages:
  - build

build-no-drm:
  stage: build
  script:
    - apt update
    - apt install cmake build-essential git -y
    - cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_COMPILE_WARNING_AS_ERROR=on -Bbuild
    - cmake --build build
    - pushd build
    - ctest
    - "! ./yav --dev drm --image ../example/tuxan.png"
    - ./yav --help
    - popd

build:
  stage: build
  script:
    - apt update
    - apt install cmake build-essential git libdrm-dev -y
    - cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_COMPILE_WARNING_AS_ERROR=on -Bbuild
    - cmake --build build
    - pushd build
    - ctest
    - ./yav --help
    - popd
  artifacts:
    name: yav
    paths:
      - build/yav

build-clang:
  stage: build
  script:
    - apt update
    - apt install cmake clang git libdrm-dev pkgconf -y
    - cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -DCMAKE_COMPILE_WARNING_AS_ERROR=on -Bbuild
    - cmake --build build
    - pushd build
    - ctest
    - ./yav --help
    - popd
  artifacts:
    name: yav
    paths:
      - build/yav

format:
  stage: build
  script:
    - apt update
    - apt install clang-format -y
    - ./format.sh -c
